<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Store</title>
</head>

<body>

<h1>My Store</h1>

<div id="status">Loading script...</div>

<h2>Products</h2>
<div id="products"></div>

<h2>Cart</h2>
<div id="cart">Cart is empty</div>
<h3 id="total"></h3>

<script>
const API = "https://stripe-backend-sisw.onrender.com/products";

let products = [];
let cart = [];

// INIT SAFE CHECK
document.getElementById("status").innerText = "SCRIPT RUNNING";

// LOAD PRODUCTS
async function loadProducts() {
  try {
    const res = await fetch(API);
    products = await res.json();

    renderProducts();
    document.getElementById("status").innerText = "PRODUCTS LOADED";
  } catch (e) {
    document.getElementById("status").innerText = "ERROR: " + e.message;
  }
}

// RENDER PRODUCTS ONLY
function renderProducts() {
  document.getElementById("products").innerHTML =
    products.map(p => `
      <div style="border:1px solid #ccc;padding:10px;margin:10px;">
        <b>${p.name}</b><br>
        $${(p.price / 100).toFixed(2)}<br>
        <button onclick="addToCart('${p.priceId}')">
          Add to Cart
        </button>
      </div>
    `).join("");
}

// CART LOGIC
function addToCart(priceId) {
  const product = products.find(p => p.priceId === priceId);
  if (!product) return;

  const item = cart.find(i => i.priceId === priceId);

  if (item) item.qty++;
  else cart.push({...product, qty: 1});

  renderCart();
}

function changeQty(priceId, delta) {
  const item = cart.find(i => i.priceId === priceId);
  if (!item) return;

  item.qty += delta;

  if (item.qty <= 0) {
    cart = cart.filter(i => i.priceId !== priceId);
  }

  renderCart();
}

function renderCart() {
  const c = document.getElementById("cart");
  const t = document.getElementById("total");

  if (cart.length === 0) {
    c.innerHTML = "Cart is empty";
    t.innerText = "";
    return;
  }

  let total = 0;

  c.innerHTML = cart.map(i => {
    total += i.price * i.qty;

    return `
      <div>
        <b>${i.name}</b><br>
        $${(i.price / 100).toFixed(2)} ×
        <button onclick="changeQty('${i.priceId}', -1)">-</button>
        ${i.qty}
        <button onclick="changeQty('${i.priceId}', 1)">-</button>
      </div>
    `;
  }).join("");

  t.innerText = "Total: $" + (total / 100).toFixed(2);
}

loadProducts();
</script>

</body>
</html>
