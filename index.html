<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Store</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .product { border: 1px solid #ccc; padding: 10px; margin: 10px; }
    button { padding: 5px 10px; cursor: pointer; }
    #cart { margin-top: 20px; border-top: 2px solid #000; padding-top: 10px; }
  </style>
</head>
<body>

<h1>My Store</h1>

<div id="products">Loading products...</div>

<h2>Cart</h2>
<div id="cart">Cart is empty</div>
<h3 id="total"></h3>

<script>
async function checkout() {
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  const res = await fetch("https://stripe-backend-sisw.onrender.com/create-checkout-session", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ items: cart })
  });

  const data = await res.json();

  if (data.url) {
    window.location.href = data.url;
  } else {
    alert("Checkout failed");
    console.log(data);
  }
}
</script>

</body>
</html>
