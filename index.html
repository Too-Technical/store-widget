<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DEBUG STORE</title>
</head>
<body>

<h1>PAGE LOADED</h1>
<div id="status">Waiting for script...</div>

<div id="products"></div>

<script>
document.getElementById("status").innerText = "SCRIPT IS RUNNING";

const API = "https://stripe-backend-sisw.onrender.com/products";

fetch(API)
  .then(r => r.json())
  .then(data => {
    document.getElementById("status").innerText = "DATA LOADED";

    document.getElementById("products").innerHTML =
      data.map(p => `
        <div>
          <b>${p.name}</b> - $${(p.price / 100).toFixed(2)}
        </div>
      `).join("");
  })
  .catch(err => {
    document.getElementById("status").innerText =
      "ERROR: " + err.message;
  });
</script>

</body>
</html>
