<!DOCTYPE html>
<html>
<body>

<h1>TEST PAGE LOADED</h1>
<div id="status">Script not running</div>

<script>
document.getElementById("status").innerText = "SCRIPT IS RUNNING";

fetch("https://stripe-backend-sisw.onrender.com/products")
  .then(r => r.json())
  .then(data => {
    document.body.innerHTML += "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
  })
  .catch(err => {
    document.getElementById("status").innerText = "ERROR: " + err.message;
  });
</script>

</body>
</html>
