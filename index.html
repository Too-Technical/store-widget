<script>
console.log("SCRIPT STARTED");

const API = "https://stripe-backend-sisw.onrender.com/products";

document.getElementById("products").innerHTML = "JS LOADED... testing API";

fetch(API)
  .then(r => {
    console.log("FETCH OK");
    return r.json();
  })
  .then(data => {
    console.log("DATA RECEIVED", data);

    document.getElementById("products").innerHTML =
      "<h2>PRODUCTS LOADED</h2>" +
      data.map(p => `
        <div>
          ${p.name} - $${(p.price / 100).toFixed(2)}
        </div>
      `).join("");
  })
  .catch(err => {
    console.error("ERROR", err);
    document.getElementById("products").innerHTML =
      "ERROR: " + err.message;
  });
</script>
