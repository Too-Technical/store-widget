<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Store Widget</title>
  <style>
    body { font-family: Arial; margin: 0; padding: 10px; }
    .product {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
    }
    button {
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>
</head>
  <body>

<div id="products">Loading products...</div>

<hr>

<h2>Cart</h2>
<div id="cart">Cart is empty</div>
<h3 id="total"></h3>

<script>
const API = "https://stripe-backend-sisw.onrender.com/products";

let cart = [];

function addToCart(product) {
  const existing = cart.find(i => i.priceId === product.priceId);

  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({...product, qty: 1});
  }

  renderCart();
}

function changeQty(priceId, delta) {
  const item = cart.find(i => i.priceId === priceId);
  if (!item) return;

  item.qty += delta;

  if (item.qty <= 0) {
    cart = cart.filter(i => i.priceId !== priceId);
  }

  renderCart();
}

function renderCart() {
  const cartDiv = document.getElementById("cart");

  if (cart.length === 0) {
    cartDiv.innerHTML = "Cart is empty";
    document.getElementById("total").innerText = "";
    return;
  }

  let total = 0;

  cartDiv.innerHTML = cart.map(item => {
    total += item.price * item.qty;

    return `
      <div>
        <b>${item.name}</b><br>
        $${(item.price / 100).toFixed(2)} × 
        <button onclick="changeQty('${item.priceId}', -1)">-</button>
        ${item.qty}
        <button onclick="changeQty('${item.priceId}', 1)">+</button>
      </div>
      <br>
    `;
  }).join("");

  document.getElementById("total").innerText =
    "Total: $" + (total / 100).toFixed(2);
}

async function load() {
  try {
    const res = await fetch(API);
    const products = await res.json();

    document.getElementById("products").innerHTML =
      products.map(p => `
        <div style="border:1px solid #ccc;padding:10px;margin:10px;">
          <h3>${p.name}</h3>
          <p>$${(p.price / 100).toFixed(2)}</p>
          <button onclick='addToCart(${JSON.stringify(p)})'>
            Add to Cart
          </button>
        </div>
      `).join("");

  } catch (e) {
    document.getElementById("products").innerHTML =
      "Error loading products: " + e.message;
  }
}

load();
</script>

</body>
</html>
