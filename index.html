<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Store</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .product {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
    }
    button {
      padding: 6px 10px;
      cursor: pointer;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1>My Store</h1>

<div id="status">Loading...</div>

<h2>Products</h2>
<div id="products"></div>

<h2>Cart</h2>
<div id="cart">Cart is empty</div>
<h3 id="total"></h3>

<button onclick="checkout()">Checkout</button>

<script>
const API = "https://stripe-backend-api-tr87.onrender.com/products";

let products = [];
let cart = [];

/* -----------------------------
   LOAD PRODUCTS
------------------------------*/
async function loadProducts() {
  try {
    const res = await fetch(API);
    products = await res.json();

    document.getElementById("status").innerText = "PRODUCTS LOADED";

    document.getElementById("products").innerHTML =
      products.map(p => `
        <div class="product">
          <b>${p.name}</b><br>
          $${(p.price / 100).toFixed(2)}<br>
          <button onclick="addToCart('${p.priceId}')">
            Add to Cart
          </button>
        </div>
      `).join("");

  } catch (err) {
    document.getElementById("status").innerText = "ERROR: " + err.message;
  }
}

/* -----------------------------
   CART LOGIC
------------------------------*/
function addToCart(priceId) {
  const product = products.find(p => p.priceId === priceId);
  if (!product) return;

  const item = cart.find(i => i.priceId === priceId);

  if (item) item.qty++;
  else cart.push({...product, qty: 1});

  renderCart();
}

function changeQty(priceId, delta) {
  const item = cart.find(i => i.priceId === priceId);
  if (!item) return;

  item.qty += delta;

  if (item.qty <= 0) {
    cart = cart.filter(i => i.priceId !== priceId);
  }

  renderCart();
}

function renderCart() {
  const c = document.getElementById("cart");
  const t = document.getElementById("total");

  if (cart.length === 0) {
    c.innerHTML = "Cart is empty";
    t.innerText = "";
    return;
  }

  let total = 0;

  c.innerHTML = cart.map(i => {
    total += i.price * i.qty;

    return `
      <div>
        <b>${i.name}</b><br>
        $${(i.price / 100).toFixed(2)} ×
        <button onclick="changeQty('${i.priceId}', -1)">-</button>
        ${i.qty}
        <button onclick="changeQty('${i.priceId}', 1)">+</button>
      </div>
    `;
  }).join("");

  t.innerText = "Total: $" + (total / 100).toFixed(2);
}

/* -----------------------------
   CHECKOUT (Stripe)
------------------------------*/
async function checkout() {
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  const res = await fetch(
    const res = await fetch(
  "https://store-backend-api-scvc.onrender.com/create-checkout-session",
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ items: cart })
    }
  );

  const data = await res.json();

  if (data.url) {
    window.open(data.url, "_top");
  } else {
    alert("Checkout failed");
    console.log(data);
  }
}

/* -----------------------------
   INIT
------------------------------*/
loadProducts();
</script>

</body>
</html>
